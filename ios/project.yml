name: MarvinTimeTracker
options:
  bundleIdPrefix: com.strubio
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
    CODE_SIGN_STYLE: Manual

configFiles:
  Debug: version.xcconfig
  Release: version.xcconfig

targets:
  MarvinTimeTracker:
    type: application
    platform: iOS
    sources:
      - path: MarvinTimeTracker
      - path: Shared
    settings:
      base:
        INFOPLIST_KEY_NSSupportsLiveActivities: YES
        INFOPLIST_KEY_NSSupportsLiveActivitiesFrequentUpdates: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.strubio.MarvinTimeTracker
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
          PROVISIONING_PROFILE_SPECIFIER: "match Development com.strubio.MarvinTimeTracker"
        Release:
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "match AppStore com.strubio.MarvinTimeTracker"
    entitlements:
      path: MarvinTimeTracker/MarvinTimeTracker.entitlements
      properties:
        aps-environment: development
        com.apple.security.application-groups:
          - group.com.strubio.MarvinTimeTracker
    dependencies:
      - target: MarvinTimeTrackerWidgets

  MarvinTimeTrackerWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: MarvinTimeTrackerWidgets
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.strubio.MarvinTimeTracker.widgets
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
          PROVISIONING_PROFILE_SPECIFIER: "match Development com.strubio.MarvinTimeTracker.widgets"
        Release:
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "match AppStore com.strubio.MarvinTimeTracker.widgets"
    entitlements:
      path: MarvinTimeTrackerWidgets/MarvinTimeTrackerWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.strubio.MarvinTimeTracker
